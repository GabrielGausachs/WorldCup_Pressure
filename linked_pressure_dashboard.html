const gd = document.getElementById('linked-pressure-plot');
if (gd) {
    const baseStyles = gd.data.map((trace) => {
        const custom = trace.customdata || [];
        const sizes = [];
        const opacities = [];
        const widths = [];

        for (let i = 0; i < custom.length; i += 1) {
            const row = custom[i] || [];
            const isHighlighted = !!row[3];
            sizes.push(isHighlighted ? 11 : 8);
            opacities.push(isHighlighted ? 1.0 : 0.4);
            widths.push(isHighlighted ? 1.2 : 0.5);
        }

        return { sizes, opacities, widths };
    });

    function applyLinkedHighlight(playerName) {
        for (let t = 0; t < gd.data.length; t += 1) {
            const trace = gd.data[t];
            const custom = trace.customdata || [];
            const base = baseStyles[t];

            const sizes = base.sizes.slice();
            const opacities = base.opacities.slice();
            const widths = base.widths.slice();

            if (playerName !== null) {
                for (let i = 0; i < custom.length; i += 1) {
                    const row = custom[i] || [];
                    if (row[0] === playerName) {
                        sizes[i] = 16;
                        opacities[i] = 1.0;
                        widths[i] = 2.2;
                    }
                }
            }

            Plotly.restyle(gd, {
                'marker.size': [sizes],
                'marker.opacity': [opacities],
                'marker.line.width': [widths]
            }, [t]);
        }
    }

    gd.on('plotly_hover', (evt) => {
        const point = evt && evt.points && evt.points[0] ? evt.points[0] : null;
        const playerName = point && point.customdata ? point.customdata[0] : null;
        applyLinkedHighlight(playerName);
    });

    gd.on('plotly_unhover', () => {
        applyLinkedHighlight(null);
    });
}
